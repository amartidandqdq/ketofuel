services:
  ketofuel:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
