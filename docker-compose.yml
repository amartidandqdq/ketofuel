services:
  ketofuel:
    build: .
    ports:
      - "8086:8086"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - path: .env
        required: false
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8086
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backup:
    image: alpine:3.19
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    # POURQUOI: Backup quotidien, rotation 7 jours
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        sleep 86400;
        DATE=$$(date +%Y-%m-%d_%H%M);
        tar -czf /backups/ketofuel-$$DATE.tar.gz -C / data;
        echo Backup ketofuel-$$DATE.tar.gz;
        ls -1t /backups/ketofuel-*.tar.gz | tail -n +8 | xargs rm -f 2>/dev/null;
      done"
    restart: unless-stopped
